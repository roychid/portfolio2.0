<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

```
:root {
  --bg: #f5f2ed;
  --ink: #1a1814;
  --ink-light: #888078;
  --rule: #d8d3cb;
  --hover-bg: #edeae4;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  min-height: 100vh;
  padding: 80px 60px;
  max-width: 900px;
}

/* Header */
.page-header {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 64px;
}

.page-header h1 {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
}

.page-header span {
  font-size: 0.72rem;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Project list */
.project-list {
  list-style: none;
}

.project-item {
  border-top: 1px solid var(--rule);
  padding: 28px 8px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 32px;
  margin: 0 -8px;
  border-radius: 4px;
  transition: background 0.15s;
}

.project-item:last-child {
  border-bottom: 1px solid var(--rule);
}

.project-item:hover {
  background: var(--hover-bg);
}

.project-item:hover .project-link {
  opacity: 1;
  transform: translateX(0);
}

/* Left column */
.project-left {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.project-name {
  font-family: 'Instrument Serif', serif;
  font-size: 1.45rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.project-desc {
  font-size: 0.78rem;
  color: var(--ink-light);
  line-height: 1.6;
  max-width: 420px;
}

.project-stack {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-top: 4px;
}

/* Right column */
.project-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  padding-top: 4px;
}

.project-link {
  font-size: 0.72rem;
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 1px;
  opacity: 0.4;
  transform: translateX(4px);
  transition: opacity 0.15s, transform 0.2s;
}

.project-image {
  width: 130px;
  height: 82px;
  border-radius: 3px;
  overflow: hidden;
  background: var(--rule);
  flex-shrink: 0;
  position: relative;
}

.project-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  opacity: 0.85;
  transition: opacity 0.2s;
}

.project-image img.active {
  display: block;
}

.project-item:hover .project-image img {
  opacity: 1;
}

.slider-dots {
  display: flex;
  gap: 5px;
}

.dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--rule);
  cursor: pointer;
  transition: background 0.15s;
}

.dot.active {
  background: var(--ink-light);
}

/* Footer */
.footer-note {
  margin-top: 52px;
  font-size: 0.68rem;
  color: var(--ink-light);
  letter-spacing: 0.06em;
}
```

```
<li class="project-item">
  <div class="project-left">
    <div class="project-name">Euro Live</div>

      <img src="images/euro-live/1.jpg" class="active" alt="Euro Live screenshot 1">
      <img src="images/euro-live/2.jpg" alt="Euro Live screenshot 2">

      <div class="dot active" data-index="0"></div>
      <div class="dot" data-index="1"></div>

```

  </ul>

  <p class="footer-note">// more coming</p>

  <script>
    document.querySelectorAll('.slider').forEach(slider => {
      const imgs = slider.querySelectorAll('img');
      const project = slider.dataset.project;
      const dotsContainer = document.querySelector(`.slider-dots[data-project="${project}"]`);
      const dots = dotsContainer ? dotsContainer.querySelectorAll('.dot') : [];
      let current = 0;
      let timer;

      function go(n) {
        imgs[current].classList.remove('active');
        dots[current]?.classList.remove('active');
        current = n % imgs.length;
        imgs[current].classList.add('active');
        dots[current]?.classList.add('active');
      }

      slider.addEventListener('mouseenter', () => {
        timer = setInterval(() => go(current + 1), 900);
      });
      slider.addEventListener('mouseleave', () => {
        clearInterval(timer);
        go(0);
      });

      dots.forEach(dot => {
        dot.addEventListener('click', e => {
          e.stopPropagation();
          clearInterval(timer);
          go(+dot.dataset.index);
        });
      });
    });
  </script>

</body>
</html>
