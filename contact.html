```
:root {
  --bg: #f5f2ed;
  --ink: #1a1814;
  --ink-light: #888078;
  --rule: #d8d3cb;
  --hover-bg: #edeae4;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  min-height: 100vh;
  padding: 80px 60px;
  max-width: 900px;
}

/* Header */
.page-header {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 64px;
}

.page-header h1 {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
}

.page-header span {
  font-size: 0.72rem;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 520px;
}

.field {
  border-top: 1px solid var(--rule);
  padding: 20px 8px;
  display: grid;
  grid-template-columns: 90px 1fr;
  align-items: start;
  gap: 16px;
  margin: 0 -8px;
  border-radius: 4px;
  transition: background 0.15s;
}

.field:last-of-type {
  border-bottom: 1px solid var(--rule);
}

.field:focus-within {
  background: var(--hover-bg);
}

.field label {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  padding-top: 3px;
  user-select: none;
}

.field input,
.field textarea {
  background: none;
  border: none;
  outline: none;
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 0.82rem;
  color: var(--ink);
  width: 100%;
  resize: none;
  line-height: 1.6;
  caret-color: var(--ink);
}

.field input::placeholder,
.field textarea::placeholder {
  color: var(--rule);
}

/* Submit row */
.submit-row {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 36px;
  padding-left: 8px;
}

.submit-btn {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
  background: none;
  border: 1px solid var(--ink);
  padding: 10px 22px;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.15s, color 0.15s;
}

.submit-btn:hover {
  background: var(--ink);
  color: var(--bg);
}

.submit-btn:disabled {
  opacity: 0.35;
  cursor: default;
}

.status {
  font-size: 0.72rem;
  color: var(--ink-light);
  opacity: 0;
  transition: opacity 0.3s;
}

.status.visible {
  opacity: 1;
}

/* Footer */
.footer-note {
  margin-top: 52px;
  font-size: 0.68rem;
  color: var(--ink-light);
  letter-spacing: 0.06em;
}

    <h1>Contact</h1>

  <form class="contact-form" id="contactForm" novalidate>

<div class="field">
  <label for="name">Name</label>
  <input type="text" id="name" placeholder="your name" autocomplete="off" required>
</div>

<div class="field">
  <label for="email">Email</label>
  <input type="email" id="email" placeholder="your email" autocomplete="off" required>
</div>

<div class="field">
  <label for="message">Message</label>
  <textarea id="message" placeholder="what's on your mind" rows="5" required></textarea>
</div>

<div class="submit-row">
  <button type="submit" class="submit-btn">Send ↗</button>
  <span class="status" id="status"></span>
</div>
```

  </form>

  <p class="footer-note">// or reach me directly wherever</p>

  <script>
    const form = document.getElementById('contactForm');
    const btn = form.querySelector('.submit-btn');
    const status = document.getElementById('status');

    function showStatus(msg) {
      status.textContent = msg;
      status.classList.add('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !message) {
        showStatus('all fields required.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      // Wire up your own endpoint here
      try {
        // await fetch('/api/contact', { method: 'POST', body: JSON.stringify({ name, email, message }) });
        await new Promise(r => setTimeout(r, 800)); // placeholder delay
        showStatus('sent. talk soon.');
        form.reset();
      } catch {
        showStatus('something went wrong. try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send ↗';
      }
    });
  </script>

</html>
